name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx biome check --diagnostic-level=error .

      - name: Type check
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

  eval-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify reference solutions (capability suite)
        run: SMALLCODE_DRY_RUN=1 bun scripts/run-baseline.ts

      - name: Validate regression suite
        run: bun scripts/validate-e1.ts

      - name: Validate capability suite
        run: bun scripts/validate-capability.ts
